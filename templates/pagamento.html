<<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="card" style="text-align:center">

        <p><b>Chave PIX:</b></p>

        <p>{{ pix }}</p>

        <p><b>Protocolo:</b></p>

        <p>{{ protocolo }}</p>

    </div>

</div>

</html>
