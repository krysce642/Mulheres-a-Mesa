<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pagamento PIX</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            text-align:center;
            padding:30px;
        }

        .card{
            background:white;
            max-width:600px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        .pix{
            background:#f8f8f8;
            padding:15px;
            border-radius:8px;
            word-break:break-all;
        }

        img{
            margin-top:20px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#6f4ca1;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
    </style>

</head>
<body>

<div class="card">

    <h1>💳 Pagamento PIX</h1>

    <h2>Mulheres à Mesa</h2>

    <p><b>Valor:</b> R$ {{ valor }}</p>

    <p><b>Chave PIX:</b></p>

    <div class="pix">
        {{ pix }}
    </div>

    <img src="{{ qr_code }}" width="250">

    <h3>PIX Copia e Cola</h3>

    <div class="pix">
        {{ pix_copia_cola }}
    </div>

    <p style="margin-top:20px;">
        Protocolo: <b>{{ protocolo }}</b>
    </p>

    <a class="btn" href="/ingresso/{{ protocolo }}">
        🎟 Ver Ingresso
    </a>

</div>

</body>
</html>
